name: Deploy Branch Preview

on:
  push:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set branch name (sanitized)
        run: |
          BRANCH=${GITHUB_REF_NAME}
          BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "BRANCH_NAME=$BRANCH" >> $GITHUB_ENV

      - name: Install cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Setup SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          {
            echo "Host r1"
            echo "  HostName ${{ secrets.PI_HOST }}"
            echo "  User ${{ secrets.PI_USER }}"
            echo "  ProxyCommand $(which cloudflared) access ssh --hostname %h --id ${{ secrets.CF_TOKEN_ID }} --secret ${{ secrets.CF_TOKEN_SECRET }}"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  StrictHostKeyChecking yes"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t spring-app:${{ env.BRANCH_NAME }} \
            --output type=docker \
            .

      - name: Save Docker image
        run: docker save spring-app:${{ env.BRANCH_NAME }} > image.tar

      - name: Copy image to Pi
        run: scp -F $HOME/.ssh/config image.tar r1:~/

      - name: Deploy on Pi
        run: |
          ssh -F $HOME/.ssh/config r1 << EOF
            set -e
            BRANCH=${{ env.BRANCH_NAME }}

            if ! docker ps -q --filter "name=db-\$BRANCH" | grep -q .; then
              docker run -d \
                --name db-\$BRANCH \
                --network web \
                --restart unless-stopped \
                -e MYSQL_ROOT_PASSWORD=${{ secrets.DB_PASSWORD }} \
                -e MYSQL_DATABASE=devflow \
                -e MYSQL_USER=${{ secrets.DB_USERNAME }} \
                -e MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
                -v devflow-db-\$BRANCH:/var/lib/mysql \
                mariadb:lts
            fi

            echo "Waiting for DB..."
            until docker exec db-\$BRANCH mariadb-admin ping -uroot -p${{ secrets.DB_PASSWORD }} --silent 2>/dev/null; do
              echo "DB not ready yet..."
              sleep 3
            done
            echo "DB is ready!"

            docker load < ~/image.tar
            docker stop app-\$BRANCH || true
            docker rm app-\$BRANCH || true

            if [ "\$BRANCH" = "main" ]; then
              docker run -d \
                --name app-\$BRANCH \
                --network web \
                --restart unless-stopped \
                -e "DB_URL=jdbc:mysql://db-\$BRANCH:3306/devflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC" \
                -e "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
                -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
                -l "traefik.enable=true" \
                -l 'traefik.http.routers.main.rule=PathPrefix(`/`)' \
                -l "traefik.http.routers.main.priority=1" \
                -l "traefik.http.middlewares.main-strip.stripprefix.prefixes=/main" \
                -l "traefik.http.routers.main.middlewares=main-strip" \
                -l "traefik.http.services.main.loadbalancer.server.port=8080" \
                spring-app:\$BRANCH
            else
              docker run -d \
                --name app-\$BRANCH \
                --network web \
                --restart unless-stopped \
                -e "DB_URL=jdbc:mysql://db-\$BRANCH:3306/devflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC" \
                -e "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
                -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
                -l "traefik.enable=true" \
                -l "traefik.http.routers.\$BRANCH.rule=PathPrefix(\`/\$BRANCH\`)" \
                -l "traefik.http.routers.\$BRANCH.priority=10" \
                -l "traefik.http.middlewares.\$BRANCH-strip.stripprefix.prefixes=/\$BRANCH" \
                -l "traefik.http.routers.\$BRANCH.middlewares=\$BRANCH-strip" \
                -l "traefik.http.services.\$BRANCH.loadbalancer.server.port=8080" \
                spring-app:\$BRANCH
            fi

            rm ~/image.tar
            echo "Done: \$BRANCH"
          EOF