spring.application.name=DevFlow-Backend
server.error.whitelabel.enabled=false

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/devflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

app.security.jwt-secret=${JWT_SECRET:devflow-dev-secret-key-please-change-in-production-min-32-bytes}
app.security.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:60}
app.security.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:30}
