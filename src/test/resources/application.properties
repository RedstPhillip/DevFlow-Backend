spring.datasource.url=jdbc:h2:mem:devflow;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=always

app.security.jwt-secret=test-secret-key-with-at-least-thirty-two-characters
app.security.access-token-minutes=60
app.security.refresh-token-days=30
